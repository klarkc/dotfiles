model = "gpt-5.5"
model_reasoning_effort = "xhigh"
sandbox_mode = "read-only"
instructions = '''
- When running any nix or devenv commands, always request execution with with_escalated_permissions=true so the nix-daemon socket is reachable while sandbox_mode=workspace-write.
- Running `devenv` on nix 2.30.4 always emits many `unknown setting 'lazy-trees'` warnings but the command still succeeds -> treat as noise and proceed.
'''

[features]
streamable_shell = true
apply_patch_freeform = true
experimental_sandbox_command_assessment = true
ghost_commit = true

[shell_environment_policy]
inherit = "all"

[sandbox_workspace_write]
writable_roots = ["/run/user/1000", "/nix/var", "/home/klarkc/.cache"]
allowed_paths = ["/nix", "/nix/store", "/nix/var", "/home/klarkc/.cache"]

[notice]
hide_rate_limit_model_nudge = true

[notice.model_migrations]
"gpt-5.1-codex-max" = "gpt-5.2-codex"
"gpt-5.1-codex-mini" = "gpt-5.2-codex"
"gpt-5.3-codex" = "gpt-5.5"

[plugins."gmail@openai-curated"]
enabled = true

[plugins."github@openai-curated"]
enabled = true

[projects."/home/klarkc"]
trust_level = "trusted"

[projects."/home/klarkc/Sources/Solo/SoloSIG2"]
trust_level = "trusted"

[projects."/home/klarkc/Sources/Solo/SoloSIG"]
trust_level = "trusted"

[tui]
theme = "ansi"

[tui.model_availability_nux]
"gpt-5.5" = 4
