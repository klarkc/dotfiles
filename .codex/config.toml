model = "gpt-5.1-codex-max"
model_reasoning_effort = "medium"
sandbox_mode = "workspace-write"
profile = "solosig"
instructions = '''
- When running any nix or devenv commands, always request execution with with_escalated_permissions=true so the nix-daemon socket is reachable while sandbox_mode=workspace-write.
- Running `devenv` on nix 2.30.4 always emits many `unknown setting 'lazy-trees'` warnings but the command still succeeds -> treat as noise and proceed.
'''

[profiles.subagent]
disable_response_storage = true
approval_policy = "never"
sandbox_mode = "danger-full-access"

[profiles.solosig]
model = "gpt-5.2-codex"
model_reasoning_effort = "medium"
personality = "pragmatic"

[profiles.solosig.mcp_servers.devenv]
command = "devenv"
args = ["mcp"]

[profiles.solosig.sandbox_workspace_write]
network_access = true

[features]
streamable_shell = true
apply_patch_freeform = true
experimental_sandbox_command_assessment = true
ghost_commit = true

[shell_environment_policy]
inherit = "all"

[sandbox_workspace_write]
writable_roots = [
    "/run/user/1000",
    "/nix/var",
    "/home/klarkc/.cache"
]
allowed_paths = [
    "/nix",
    "/nix/store",
    "/nix/var",
    "/home/klarkc/.cache"
]

[notice]
hide_rate_limit_model_nudge = true

[notice.model_migrations]
"gpt-5.1-codex-max" = "gpt-5.2-codex"
"gpt-5.1-codex-mini" = "gpt-5.2-codex"

[plugins."gmail@openai-curated"]
enabled = true

[plugins."github@openai-curated"]
enabled = true

[projects."/home/klarkc"]
trust_level = "trusted"

[tui.model_availability_nux]
"gpt-5.5" = 2
