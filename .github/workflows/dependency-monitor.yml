name: "Dependency Monitor"
on:
  schedule:
    # Run weekly on Monday at 06:00 UTC (matches systemd timer)
    - cron: '0 6 * * 1'
  pull_request:
    paths:
      - 'flake.lock'
      - '.local/bin/deps-check'
      - '.github/workflows/dependency-monitor.yml'

jobs:
  check-deps:
    name: "Check for outdated dependencies"
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y jq

      - name: Run dependency check
        id: deps-check
        run: |
          OUTPUT=$(.local/bin/deps-check --json --quiet 2>&1) || true
          echo "$OUTPUT" > deps-check-result.json
          echo "result=$OUTPUT" >> "$GITHUB_OUTPUT"
          echo "$OUTPUT" | jq .

      - name: Check results
        id: check
        run: |
          STATUS=$(jq -r '.status' deps-check-result.json)
          OUTDATED=$(jq -r '.outdated_count' deps-check-result.json)
          TOTAL=$(jq -r '.total_checked' deps-check-result.json)

          if [ "$STATUS" = "outdated" ]; then
            echo "::warning title=Outdated dependencies found::$OUTDATED out of $TOTAL dependencies are outdated"
            echo "status=outdated" >> "$GITHUB_OUTPUT"
            # Print summary table
            echo ""
            echo "### Outdated Dependencies"
            echo ""
            echo "| Dependency | Locked | Latest | Branch | Stale (hours) |"
            echo "|------------|--------|--------|--------|---------------|"
            jq -r '.outdated[] | "| \(.name) | \(.locked_rev[0:7]) | \(.latest[0:7]) | \(.branch) | \(.stale_hours) |"' deps-check-result.json
          else
            echo "status=ok" >> "$GITHUB_OUTPUT"
            echo "All $TOTAL dependency(ies) are up to date."
          fi

      - name: Create issue if outdated
        if: steps.check.outputs.status == 'outdated'
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const output = require('./deps-check-result.json');
            const outdated = output.outdated;
            const body = `## Outdated Dependencies Detected

This repository has **${outdated.length}** outdated dependency(ies) out of **${output.total_checked}** checked.

${outdated.map(d => `### ${d.name} (\`${d.owner}/${d.repo}\`)
- **Locked revision:** \`${d.locked_rev}\`
- **Latest revision:** \`${d.latest}\`
- **Branch:** \`${d.branch}\`
- **Estimated staleness:** ${d.stale_hours} hours`).join('\n\n')}

---
*This issue was auto-created by the Dependency Monitor workflow.*`;

            // Check if there's already an open issue for this
            const issues = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              labels: 'dependency-alert'
            });

            if (issues.data.length > 0) {
              // Update existing issue
              const existing = issues.data[0];
              await github.rest.issues.update({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: existing.number,
                body: body
              });
              console.log(`Updated existing issue #${existing.number}`);
            } else {
              // Create new issue
              await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title: `Outdated Dependencies: ${outdated.length} dependency(ies) behind`,
                body: body,
                labels: ['dependency-alert', 'automation']
              });
              console.log('Created new dependency alert issue');
            }
