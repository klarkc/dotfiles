onboarding = false

[theme]
name = "terminal"

[keys]
# Keep only overrides that differ from Herdr defaults.
# Herdr's prefix already defaults to ctrl+b; tmux remains ctrl+a in .tmux.conf.

# Tmux-like bindings not covered by Herdr defaults.
split_vertical = "prefix+\u007c"
rename_tab = "prefix+comma"
close_tab = "prefix+ampersand"
detach = "prefix+d"

# Optional Herdr actions with a clear tmux-style equivalent.
previous_workspace = "prefix+shift+9"
next_workspace = "prefix+shift+0"
last_pane = "prefix+\u003b"

# Move Herdr actions away from tmux muscle-memory keys:
# - prefix+s is send-pane-to in .tmux.conf.
# - prefix+j is join-pane-from in .tmux.conf.
settings = "prefix+shift+s"
focus_pane_down = "prefix+down"

# Optional actions
open_worktree = "prefix+shift+o"
remove_worktree = "prefix+alt+d"
next_tab = ["prefix+n"]
next_agent = ["prefix+space", "prefix+$"]
prevous_agent = "prefix+shift+space"

[ui.toast]
delivery = "system"

[experimental]
pane_history = true

[ui]
agent_panel_scope = "all"
show_agent_labels_on_pane_borders = true
agent_panel_sort = "priority"
